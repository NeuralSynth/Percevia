name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/frontend.yml'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc.json'
      - 'tsconfig.json'
      - 'next.config.js'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
      env:
        NEXT_PUBLIC_SOCKET_URL: "http://localhost:5000"
        CI: false # Prevents build failure on warnings
